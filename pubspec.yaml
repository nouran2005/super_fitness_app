name: super_fitness_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  bloc: ^9.2.0
  cupertino_icons: ^1.0.8
  dio: ^5.9.1
  easy_localization: ^3.0.8
  equatable: ^2.0.8 
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.4
  get_it: ^9.2.0
  go_router: ^17.1.0
  injectable: ^2.7.1+4
  intl: ^0.20.2
  json_annotation: ^4.9.0
  pretty_dio_logger: ^1.4.0
  retrofit: 4.9.1
  shared_preferences: ^2.2.2
  lottie: ^3.3.2
  toastification: 
  flutter_spinkit:
  flutter_native_splash: ^2.4.7
  pin_code_fields: ^9.3.0
  percent_indicator: ^4.2.5
  shimmer: ^3.0.0
  youtube_player_iframe: ^5.2.2
  youtube_player_flutter: ^9.1.1

dev_dependencies:
  bloc_test: any
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  analyzer: ">=7.0.0 <9.0.0"
  injectable_generator: ^2.4.1
  json_serializable: any
  mockito: ^5.4.4
  retrofit_generator: 10.2.0
  network_image_mock: ^2.1.1
  mocktail: ^1.0.3
  flutter_launcher_icons:
  
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - assets/jsons/
    - assets/images/sections background.png
    - assets/images/prfofle photo .png

flutter_assets:
  assets_path: assets/images/
  output_path: lib/app/core/ui_helper/assets/
  filename: app_images.dart
  field_prefix: null
flutter_intl:
  enabled: true


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  
  adaptive_icon_background: "#1A2026" 
  adaptive_icon_foreground: "assets/images/app_icon.png"


flutter_native_splash:
  color: "#242424"
  image: assets/images/splash_screen.png

  android_12:
    image: assets/images/splash_android12.png
    icon_background_color: "#242424"
